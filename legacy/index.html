<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Impressive Royal · Nomenclatura</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --dark: #0A0A0F;
    --dark2: #12121A;
    --text: #F0EDE8;
    --text-dim: #9A9080;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:var(--dark); color:var(--text); font-family:'Montserrat',sans-serif; min-height:100vh; overflow-x:hidden; }

  /* HEADER */
  header {
    padding: 28px 20px 20px;
    border-bottom: 1px solid rgba(201,168,76,0.2);
    background: linear-gradient(180deg, rgba(201,168,76,0.04) 0%, transparent 100%);
  }
  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(24px, 6vw, 44px);
    font-weight: 300;
    letter-spacing: 4px;
    text-transform: uppercase;
    line-height: 1;
  }
  h1 span { color: var(--gold); }
  .header-sub {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 7px;
    font-weight: 300;
  }
  .header-stats {
    display: flex;
    gap: 0;
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 4px;
    overflow: hidden;
  }
  .stat {
    text-align: center;
    padding: 10px 14px;
    border-right: 1px solid rgba(201,168,76,0.15);
  }
  .stat:last-child { border-right: none; }
  .stat-num { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: var(--gold); line-height: 1; }
  .stat-label { font-size: 7px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-top: 3px; }

  /* NAV - bottom fixed en móvil */
  nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    background: rgba(10,10,15,0.97);
    border-top: 1px solid rgba(201,168,76,0.2);
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .tab {
    flex: 1;
    padding: 14px 8px 16px;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    cursor: pointer;
    border-top: 2px solid transparent;
    transition: all 0.2s;
    text-align: center;
    font-weight: 500;
  }
  .tab-icon { font-size: 18px; display: block; margin-bottom: 4px; }
  .tab.active { color: var(--gold); border-top-color: var(--gold); }

  /* MAIN */
  main { padding: 20px 16px 90px; }
  .panel { display: none; }
  .panel.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  /* MAPA */
  .map-img-container {
    background: var(--dark2);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .map-img-container img { width: 100%; display: block; }

  .ala-cards { display: flex; flex-direction: column; gap: 10px; }
  .ala-card {
    background: var(--dark2);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 6px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s;
    border-left: 4px solid transparent;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .ala-card:active { transform: scale(0.98); }
  .ala-card-left { flex: 1; }
  .ala-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; letter-spacing: 2px; }
  .ala-desc { font-size: 9px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; margin-top: 3px; }
  .ala-cats { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
  .cat-badge { font-size: 8px; padding: 2px 7px; border-radius: 2px; background: rgba(255,255,255,0.06); color: var(--text-dim); letter-spacing: 1px; }
  .ala-right { text-align: right; flex-shrink: 0; }
  .ala-total { font-family: 'Cormorant Garamond', serif; font-size: 26px; color: var(--gold); line-height: 1; }
  .ala-total-label { font-size: 8px; color: var(--text-dim); letter-spacing: 2px; }
  .ala-arrow { color: var(--text-dim); font-size: 14px; margin-top: 4px; }

  /* HABITACIONES */
  .section-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 16px; }

  .filters-wrap { margin-bottom: 18px; }
  .filter-group { margin-bottom: 10px; }
  .filter-label { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; display: block; }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    padding: 7px 12px; font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.1); background: transparent; color: var(--text-dim);
    cursor: pointer; border-radius: 3px; transition: all 0.2s; font-family: 'Montserrat', sans-serif;
    white-space: nowrap;
  }
  .filter-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.08); }

  .rooms-count { font-size: 10px; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 14px; }

  .rooms-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  @media(min-width:480px) { .rooms-grid { grid-template-columns: repeat(3,1fr); } }
  @media(min-width:700px) { .rooms-grid { grid-template-columns: repeat(4,1fr); } }

  .room-card {
    background: var(--dark2);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 5px;
    padding: 12px;
    transition: all 0.15s;
    border-left: 3px solid transparent;
  }
  .room-card:active { transform: scale(0.97); }
  .room-code { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-weight: 600; letter-spacing: 1px; margin-bottom: 4px; word-break: break-all; }
  .room-floor { font-size: 8px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 3px; }
  .room-cat { font-size: 8px; padding: 2px 6px; border-radius: 2px; display: inline-block; margin-top: 2px; }
  .room-beds { font-size: 8px; color: var(--text-dim); margin-top: 3px; }

  /* RESUMEN */
  .summary-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 22px;
  }
  .summary-card {
    background: var(--dark2);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 6px;
    padding: 18px 12px;
    text-align: center;
  }
  .summary-num { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; color: var(--gold); line-height: 1; }
  .gold-line { width: 28px; height: 1px; background: var(--gold); margin: 8px auto; }
  .summary-label { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); }

  .ala-summary-cards { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .ala-sum-card {
    background: var(--dark2);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 6px;
    padding: 14px 16px;
    border-left: 4px solid transparent;
  }
  .ala-sum-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .ala-sum-name { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; letter-spacing: 2px; }
  .ala-sum-total { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: var(--gold); }
  .ala-sum-meta { font-size: 9px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .ala-sum-cats { display: flex; gap: 4px; flex-wrap: wrap; }

  .code-box {
    background: var(--dark2);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 6px;
    padding: 22px 18px;
  }
  .code-box-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px; }
  .code-display { font-family: 'Cormorant Garamond', serif; font-size: clamp(28px, 8vw, 44px); font-weight: 600; color: var(--gold); letter-spacing: 3px; margin-bottom: 18px; }
  .code-parts { display: flex; gap: 0; border: 1px solid rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
  .code-part { flex: 1; padding: 12px 8px; text-align: center; border-right: 1px solid rgba(255,255,255,0.06); }
  .code-part:last-child { border-right: none; }
  .code-part-val { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--gold-light); font-weight: 600; }
  .code-part-label { font-size: 8px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin-top: 4px; }
</style>
</head>

  <div class="header-top">
    <div>
      <h1>IMPRESSIVE <span>ROYAL</span></h1>
      <div class="header-sub">Sistema de nomenclatura &middot; 6 alas &middot; 4 plantas</div>
    </div>
    <div class="header-stats">
      <div class="stat"><div class="stat-num">275</div><div class="stat-label">Hab.</div></div>

      <div class="stat"><div class="stat-num">4</div><div class="stat-label">Plant.</div></div>
    </div>
  </div>
</header>

  <div class="tab" onclick="showPanel('resumen',this)">
    <span class="tab-icon">📊</span>Resumen
  </div>
</nav>

<script>
const ALAS=[
  {nombre:'PALMERA',color:'#2E7D32',desc:'Ala Noroeste',vista:'Vista Jardin',total:46,cats:['Estandar','Superior','Junior Suite']},
  {nombre:'CORAL',  color:'#C62828',desc:'Ala Suroeste',vista:'Vista Piscina',total:46,cats:['Estandar','Superior','Junior Suite','Suite']},
  {nombre:'ARENA',  color:'#E65100',desc:'Ala Sur',     vista:'Vista Jardin / Entrada',total:46,cats:['Estandar','Superior','Junior Suite','Suite']},
  {nombre:'BRISA',  color:'#1565C0',desc:'Ala Sureste', vista:'Vista Piscina',total:46,cats:['Estandar','Superior','Junior Suite','Suite']},
  {nombre:'LAGUNA', color:'#00838F',desc:'Ala Este',    vista:'Vista Jardin',total:46,cats:['Estandar','Superior','Junior Suite']},
  {nombre:'JARDIN', color:'#6A1B9A',desc:'Ala Norte / Central',vista:'Vista Jardin Central',total:45,cats:['Estandar','Superior','Junior Suite','Suite']},
];
const CAT_COLORS={
  'Estandar':{bg:'rgba(255,255,255,0.05)',text:'#9A9080'},
  'Superior':{bg:'rgba(21,101,192,0.2)',text:'#64B5F6'},
  'Junior Suite':{bg:'rgba(230,120,0,0.2)',text:'#FFB74D'},
  'Suite':{bg:'rgba(198,40,40,0.2)',text:'#EF9A9A'},
};
const CAMAS={'Estandar':'Doble / Twin','Superior':'King / Doble','Junior Suite':'King','Suite':'King + Sofa'};
const PL=['Planta Baja','Planta 1a','Planta 2a','Planta 3a'];

function generateRooms(){
  const rooms=[];
  const d={p1:{'Estandar':8,'Superior':4},p2:{'Estandar':8,'Superior':3,'Junior Suite':1},p3:{'Estandar':7,'Superior':3,'Junior Suite':1},p4:{'Superior':6,'Junior Suite':3,'Suite':2}};
  const dJ={p1:{'Estandar':8,'Superior':4},p2:{'Estandar':6,'Superior':3,'Junior Suite':2},p3:{'Estandar':5,'Superior':3,'Junior Suite':2,'Suite':1},p4:{'Junior Suite':5,'Suite':6}};
  ALAS.forEach(a=>{
    const dist=a.nombre==='JARDIN'?dJ:d;
    [1,2,3,4].forEach((p,pi)=>{
      let n=1;
      Object.entries(dist['p'+p]).forEach(([cat,qty])=>{
        for(let i=0;i<qty;i++){
          rooms.push({codigo:`${a.nombre}-${p}${String(n).padStart(2,'0')}`,ala:a.nombre,color:a.color,planta:PL[pi],cat,camas:CAMAS[cat]});
          n++;
        }
      });
    });
  });
  return rooms;
}
const ALL_ROOMS=generateRooms();
let activeAla='TODAS',activeCat='TODAS';

function renderAlaCards(){
  document.getElementById('ala-cards').innerHTML=ALAS.map(a=>`
    <div class="ala-card" style="border-left-color:${a.color}" onclick="filterByAla('${a.nombre}')">
      <div class="ala-card-left">
        <div class="ala-name" style="color:${a.color}">${a.nombre}</div>
        <div class="ala-desc">${a.desc} &middot; ${a.vista}</div>
        <div class="ala-cats">${a.cats.map(c=>`<span class="cat-badge">${c}</span>`).join('')}</div>
      </div>
      <div class="ala-right">
        <div class="ala-total">${a.total}</div>
        <div class="ala-total-label">hab.</div>
        <div class="ala-arrow">›</div>
      </div>
    </div>`).join('');
}

function renderRooms(){
  let f=ALL_ROOMS;
  if(activeAla!=='TODAS') f=f.filter(r=>r.ala===activeAla);
  if(activeCat!=='TODAS') f=f.filter(r=>r.cat===activeCat);
  document.getElementById('rooms-count').textContent=f.length+' habitaciones';
  document.getElementById('rooms-grid').innerHTML=f.map(r=>{
    const cc=CAT_COLORS[r.cat]||{bg:'rgba(255,255,255,0.05)',text:'#9A9080'};
    return`<div class="room-card" style="border-left-color:${r.color}">
      <div class="room-code" style="color:${r.color}">${r.codigo}</div>
      <div class="room-floor">${r.planta}</div>
      <div class="room-cat" style="background:${cc.bg};color:${cc.text}">${r.cat}</div>
      <div class="room-beds">${r.camas}</div></div>`;
  }).join('');
}

function renderFilters(){
  const alas=['TODAS',...ALAS.map(a=>a.nombre)];
  const cats=['TODAS','Estandar','Superior','Junior Suite','Suite'];
  document.getElementById('filter-alas').innerHTML=alas.map(a=>`<button class="filter-btn ${a===activeAla?'active':''}" onclick="setAla('${a}')">${a}</button>`).join('');
  document.getElementById('filter-cats').innerHTML=cats.map(c=>`<button class="filter-btn ${c===activeCat?'active':''}" onclick="setCat('${c}')">${c}</button>`).join('');
}

function renderAlaSummary(){
  document.getElementById('ala-summary-cards').innerHTML=ALAS.map(a=>`
    <div class="ala-sum-card" style="border-left-color:${a.color}">
      <div class="ala-sum-header">
        <div class="ala-sum-name" style="color:${a.color}">${a.nombre}</div>
        <div class="ala-sum-total">${a.total} hab.</div>
      </div>
      <div class="ala-sum-meta">${a.desc} &middot; ${a.vista}</div>
      <div class="ala-sum-cats">${a.cats.map(c=>{const cc=CAT_COLORS[c]||{bg:'rgba(255,255,255,0.05)',text:'#9A9080'};return`<span class="cat-badge" style="background:${cc.bg};color:${cc.text}">${c}</span>`;}).join('')}</div>
    </div>`).join('');
}

function setAla(a){activeAla=a;renderFilters();renderRooms();}
function setCat(c){activeCat=c;renderFilters();renderRooms();}
function filterByAla(a){
  activeAla=a;activeCat='TODAS';
  showPanel('habitaciones',document.querySelectorAll('.tab')[1]);
  renderFilters();renderRooms();
}
function showPanel(id,el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  if(el){el.classList.add('active');}
  window.scrollTo({top:0,behavior:'smooth'});
}

renderAlaCards();renderFilters();renderRooms();renderAlaSummary();
</script>
