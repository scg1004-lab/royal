<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Impressive Royal · Nomenclatura</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Outfit:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    body {
      background-color: #FFFFFF !important;
      color: #1A1A1F !important;
    }

    #app {
      background-color: #FFFFFF !important;
    }

    header {
      background: linear-gradient(180deg, rgba(184, 134, 11, 0.05) 0%, #FFFFFF 100%) !important;
    }
  </style>
  <script type="module" crossorigin src="/assets/index-l1EryMtL.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-DhBhRmtO.css">
</head>

<body>
  <div id="app">
    <header>
      <div class="header-content">
        <div class="brand">
          <h1>IMPRESSIVE <span class="accent">ROYAL</span></h1>
          <p class="subtitle">SISTEMA ESTRATÉGICO DE NOMENCLATURA</p>
        </div>

        <div class="header-actions">
          <div class="header-stats">
            <div class="stat-pill"><span class="v">275</span> <span class="l">Hab.</span></div>
            <div class="stat-pill"><span class="v">6</span> <span class="l">Alas</span></div>
            <div class="stat-pill"><span class="v">4</span> <span class="l">Plantas</span></div>
          </div>
          <div class="header-links">
            <a href="informe-royal.pdf" target="_blank" class="h-link"><span class="icon">📄</span> PDF</a>
            <a href="datos-royal.xlsx" download class="h-link"><span class="icon">📊</span> EXCEL</a>
          </div>
        </div>
      </div>
    </header>

    <main>
      <div class="tab-content active" id="view-resumen">
        <div class="summary-list" id="summary-alas">
          <!-- Summary cards -->
        </div>
      </div>

      <div class="tab-content" id="view-mapa">
        <section class="card map-section">
          <div class="card-header">
            <h2>MAPA GENERAL</h2>
            <p>Distribución de bloques y orientación</p>
          </div>
          <div class="map-container">
            <img src="maparoyal.jpeg" alt="Mapa Royal" id="main-map">
            <div class="map-overlay"></div>
          </div>
        </section>

        <section class="alas-grid" id="alas-container">
          <!-- Alas will be rendered here -->
        </section>
      </div>

      <div class="tab-content" id="view-habitaciones">
        <section class="filters card">
          <div class="filter-group">
            <label>FILTRAR POR ALA</label>
            <div class="filter-options" id="filter-alas"></div>
          </div>
          <div class="filter-group">
            <label>CATEGORÍA</label>
            <div class="filter-options" id="filter-cats"></div>
          </div>
        </section>

        <div class="rooms-status">
          <span id="rooms-count">0 habitaciones</span>
        </div>

        <div class="rooms-grid" id="rooms-grid">
          <!-- Rooms will be rendered here -->
        </div>
      </div>
    </main>

    <nav class="bottom-nav">
      <button class="nav-item active" data-view="resumen">
        <span class="icon">📊</span>
        <span class="label">RESUMEN</span>
      </button>
      <button class="nav-item" data-view="mapa">
        <span class="icon">🗺️</span>
        <span class="label">MAPA</span>
      </button>
      <button class="nav-item" data-view="habitaciones">
        <span class="icon">🔑</span>
        <span class="label">HAB.</span>
      </button>
    </nav>
  </div>
</body>

</html>
